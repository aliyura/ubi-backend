version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ubi-db
    environment:
      POSTGRES_DB: ubi
      POSTGRES_USER: ubi
      POSTGRES_PASSWORD: ubi123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
